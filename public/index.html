<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メディアビューワー</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="breadcrumb" id="breadcrumb" style="display: none;"></div>
      <div class="filter-bar">
        <select id="year-filter" class="filter-select">
          <option value="">すべての年</option>
        </select>
        <input type="text" id="search-input" class="search-input" placeholder="イベント名で検索...">
        <select id="sort-order" class="filter-select">
          <option value="desc">新しい順</option>
          <option value="asc">古い順</option>
        </select>
        <select id="thumbnail-size" class="filter-select">
          <option value="small">小</option>
          <option value="medium" selected>中</option>
          <option value="large">大</option>
        </select>
        <button id="rescan-btn" class="rescan-btn" title="ファイルを再スキャン">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13.65 2.35A7.96 7.96 0 0 0 8 0C3.58 0 0 3.58 0 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 8 14 6 6 0 1 1 8 2c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35z" fill="currentColor"/>
          </svg>
        </button>
        <div class="stats">
          <span id="stats-text">読み込み中...</span>
        </div>
      </div>
    </header>

    <!-- Year Index Navigation -->
    <div class="year-index" id="year-index" style="display: none;"></div>

    <!-- Gallery Grid -->
    <main class="gallery-container" id="gallery">
      <div class="loading-message">読み込み中...</div>
    </main>

    <!-- Lightbox Modal -->
    <div class="lightbox-modal" id="lightbox">
      <button class="lightbox-close" id="lightbox-close">&times;</button>
      <button class="lightbox-prev" id="lightbox-prev">&lt;</button>
      <button class="lightbox-next" id="lightbox-next">&gt;</button>
      <button class="lightbox-info-btn" id="lightbox-info-btn" title="詳細情報">ⓘ</button>
      <div class="lightbox-content" id="lightbox-content">
        <img src="" alt="">
      </div>
      <div class="lightbox-info" id="lightbox-info">
        <span class="lightbox-filename"></span>
        <span class="lightbox-counter"></span>
      </div>

      <!-- Info Panel -->
      <div class="lightbox-info-panel" id="lightbox-info-panel">
        <div class="info-panel-header">
          <h3>詳細情報</h3>
          <button class="info-panel-close" id="info-panel-close">&times;</button>
        </div>
        <div class="info-panel-content" id="info-panel-content">
          <div class="loading">読み込み中...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="/js/tauri-app.js"></script>
  <script src="/js/kana-converter.js"></script>
  <script src="/js/gallery.js"></script>
  <script src="/js/lightbox.js"></script>
  <script>
    // Initialize app
    document.addEventListener('DOMContentLoaded', async () => {
      // Initialize Tauri if running as desktop app
      const tauriApp = new TauriApp();
      await tauriApp.init();

      if (tauriApp.isTauri && !tauriApp.mediaBasePath) {
        document.getElementById('gallery').innerHTML =
          '<div class="error-message">メディアフォルダが選択されていません。アプリを再起動してください。</div>';
        return;
      }
      try {
        // Create gallery instance
        const galleryContainer = document.getElementById('gallery');
        const gallery = new Gallery(galleryContainer, tauriApp);

        // Load media data
        await gallery.load();

        // Create lightbox instance
        const lightbox = new Lightbox(gallery);

        // Setup filter controls
        const yearFilter = document.getElementById('year-filter');
        const searchInput = document.getElementById('search-input');
        const statsText = document.getElementById('stats-text');

        // Populate year filter
        function updateYearFilter() {
          const currentValue = yearFilter.value;

          // Remove all options except first ("すべての年")
          while (yearFilter.options.length > 1) {
            yearFilter.remove(1);
          }

          // Repopulate with current sort order
          const years = gallery.getYears();
          years.forEach(year => {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            yearFilter.appendChild(option);
          });

          // Restore selection
          yearFilter.value = currentValue;
        }

        updateYearFilter();

        // Restore state from URL
        const urlState = gallery.restoreFromURL();
        if (urlState.year) {
          yearFilter.value = urlState.year;
          gallery.switchToHierarchicalMode(urlState.year, urlState.path);
        }
        if (urlState.query) {
          searchInput.value = urlState.query;
          gallery.filterByEvent(urlState.query);
        }
        // Scroll to year from hash (for flat mode)
        if (urlState.hash && !urlState.year) {
          setTimeout(() => gallery.scrollToYear(urlState.hash), 100);
        }

        // Update stats
        function updateStats() {
          let items;
          if (gallery.displayMode === 'hierarchical') {
            // All files under current path (including subfolders)
            const depth = gallery.currentPath.length;
            items = gallery.filteredItems.filter(item => {
              const parts = item.path.split('/');
              return gallery.currentPath.every((p, i) => parts[i] === p);
            });
          } else {
            items = gallery.filteredItems;
          }
          const total = items.length;
          const images = items.filter(item => item.type === 'image').length;
          const videos = items.filter(item => item.type === 'video').length;
          statsText.textContent = `全${total}件（写真${images}、動画${videos}）`;
        }

        updateStats();
        gallery.onRender = updateStats;

        // Year filter handler
        yearFilter.addEventListener('change', (e) => {
          if (e.target.value) {
            gallery.switchToHierarchicalMode(e.target.value);
          } else {
            gallery.switchToFlatMode();
          }
          updateStats();
        });

        // Search input handler
        searchInput.addEventListener('input', (e) => {
          gallery.filterByEvent(e.target.value);
          updateStats();
        });

        // Sort order handler
        const sortOrder = document.getElementById('sort-order');
        sortOrder.addEventListener('change', (e) => {
          gallery.setSortOrder(e.target.value);
          updateYearFilter();
        });

        // Thumbnail size handler
        const thumbnailSize = document.getElementById('thumbnail-size');
        thumbnailSize.addEventListener('change', (e) => {
          galleryContainer.className = 'gallery-container size-' + e.target.value;
        });

        // Rescan button handler
        const rescanBtn = document.getElementById('rescan-btn');
        rescanBtn.addEventListener('click', async () => {
          if (rescanBtn.classList.contains('loading')) return;

          rescanBtn.classList.add('loading');
          statsText.parentElement.style.minWidth = statsText.parentElement.offsetWidth + 'px';
          statsText.textContent = '再スキャン中...';

          try {
            if (tauriApp.isTauri) {
              await tauriApp.forceScan();
            } else {
              await fetch('/api/scan');
            }
            await gallery.load();
            updateYearFilter();
            updateStats();
          } catch (error) {
            console.error('Rescan failed:', error);
            alert('再スキャンに失敗しました');
          } finally {
            rescanBtn.classList.remove('loading');
            statsText.parentElement.style.minWidth = '';
          }
        });

      } catch (error) {
        console.error('Failed to initialize app:', error);
        document.getElementById('gallery').innerHTML =
          '<div class="error-message">メディアの読み込みに失敗しました</div>';
      }
    });
  </script>
</body>
</html>
